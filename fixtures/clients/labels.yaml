# Ground-truth labels for the miner fixture corpus.
#
# Each entry is one expected (method, path_template) endpoint discovered
# from a fixture subdirectory. The corpus drives the recall metric in
# `tests/test_mining_recall.py`.

python_requests:
  - method: GET
    path: /users
  - method: GET
    path: /users/{user_id}
  - method: POST
    path: /users
  - method: PATCH
    path: /users/{user_id}
  - method: DELETE
    path: /users/{user_id}
  - method: GET
    path: /search
  - method: GET
    path: /healthz

